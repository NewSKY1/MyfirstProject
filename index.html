<!DOCTYPE html><!-- "This is a modern HTML5 file" — must be line 1, always -->
<html lang="en">
<!-- Root wrapper for entire page. lang="en" = English content -->
<head>
<!-- Invisible control panel begins -->
<meta charset="UTF-8">
<!-- Allow ALL characters: letters, symbols, emoji, every language -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Make page fit perfectly on phones and tablets -->
<title>My First HTML Page</title>
<!-- Text on browser tab + Google search headline -->
</head>
<!-- Invisible control panel ends -->
<body>
<!-- Everything visible begins here -->
<h1>Hello World!</h1>
<!-- Large heading — visible on screen -->
<p>This is my first webpage.</p>
<!-- Paragraph text — visible on screen -->
</body>
<!-- Everything visible ends here -->
</html>
<!-- The entire page ends here -->
